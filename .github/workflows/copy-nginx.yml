# .github/workflows/copy-nginx.yml
name: Copy Nginx Config to VPS

on: workflow_dispatch # Manuell auslösbar

jobs:
  copy-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy nginx.conf to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker/nginx.conf"
          target: "/etc/nginx/conf.d/simpleboard.conf"

      - name: Reload Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            nginx -t && systemctl reload nginx
